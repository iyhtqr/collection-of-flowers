<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Collection of Flowers</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <main class="page">
    <header class="header-container">
      <h1 class="fade-in">Collection of flowers :)</h1>
      <p class="subtitle fade-in">
        A dedicated place for holding the so-called <span class="accent">"unaesthetic"</span> flowers.
      </p>
    </header>

    <section class="gallery" id="gallery">
      <div class="item fade-in">
        <img src="docs/20260115_3.jpg" alt="Flower 1">
        <div class="label">2026-01-15</div>
      </div>
      <div class="item fade-in">
        <img src="docs/20260115_2.jpg" alt="Flower 2">
        <div class="label">2026-01-15</div>
      </div>
      <div class="item fade-in">
        <img src="docs/20260115_1.jpg" alt="Flower 3">
        <div class="label">2026-01-15</div>
      </div>
      <div class="item fade-in">
        <img src="docs/20260107.jpg" alt="Flower 4">
        <div class="label">2026-01-07</div>
      </div>
      <div class="item fade-in">
        <img src="docs/20251229_2.jpg" alt="Flower 5">
        <div class="label">2025-12-29</div>
      </div>
      <div class="item fade-in">
        <img src="docs/20251229_1.jpg" alt="Flower 6">
        <div class="label">2025-12-29</div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="close" id="closeBtn" aria-label="Close image">&times;</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script src="script.js"></script>
</body>
</html>
